services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: mini_park
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
  
  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    environment:
      SECRET: "supersecret"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin123"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "mini_park"
      DB_USER: "medusa"
      DB_PASSWORD: "medusa"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  
networks:
  default:
    driver: bridge


